name: Billing Reconcile (Daily Cron)

# Executa diariamente às 08:00 UTC para verificar grace periods expirados.
# Faz downgrade de orgs com PAST_DUE + graceUntil < now para FREE.
#
# Segredos necessários (GitHub → Settings → Secrets):
#   APP_BASE_URL  : URL pública da aplicação (ex: https://app.projorg.dev)
#   CRON_SECRET   : segredo para autenticar a chamada ao endpoint de cron

on:
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC todos os dias

  # Permite disparo manual para testes
  workflow_dispatch:

jobs:
  reconcile:
    name: "Grace Period Reconcile"
    runs-on: ubuntu-latest

    steps:
      - name: Call billing reconcile endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_BASE_URL }}/api/cron/billing-reconcile")

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Cron job failed with status $HTTP_STATUS"
            exit 1
          fi
