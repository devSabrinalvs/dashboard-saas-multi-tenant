name: Deploy (Production)

# Disparado manualmente ou após o CI passar na branch main.
# Fluxo principal de deploy usa vercel-build (package.json),
# que roda "prisma generate && prisma migrate deploy && next build".
# Este workflow é a alternativa para controle explícito de migrations.
#
# Para usar este workflow como principal:
#   1. Desabilitar o auto-deploy no Vercel (Vercel → Project → Git → Disable auto-deploy)
#   2. Adicionar VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID nos GitHub Secrets
#   3. Adicionar DATABASE_URL_PROD nos GitHub Secrets (URL do banco de produção)
#
# Abordagem RECOMENDADA (mais simples): usar "vercel-build" em package.json
# e deixar o Vercel fazer o deploy automaticamente (veja docs/runbook.md).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        default: "production"
        type: choice
        options: [production, preview]

jobs:
  migrate:
    name: "Migrate DB"
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma:generate

      - name: Run DB migrations (production)
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

  deploy:
    name: "Deploy to Vercel"
    runs-on: ubuntu-latest
    needs: migrate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL_PROD }}
          PASSWORD_PEPPER: ${{ secrets.PASSWORD_PEPPER }}
          TWO_FACTOR_ENCRYPTION_KEY: ${{ secrets.TWO_FACTOR_ENCRYPTION_KEY }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  smoke-test:
    name: "Smoke Test"
    runs-on: ubuntu-latest
    needs: deploy
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run smoke tests
        run: node scripts/smoke-test.mjs ${{ secrets.NEXTAUTH_URL_PROD }}
